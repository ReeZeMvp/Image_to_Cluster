- name: Déployer nginx-custom sur K3d
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    ansible_python_interpreter: /home/codespace/.python/current/bin/python3
  tasks:
    - name: Créer le namespace
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: nginx-app

    - name: Déployer le Deployment nginx-custom
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: nginx-custom
            namespace: nginx-app
          spec:
            replicas: 2
            selector:
              matchLabels:
                app: nginx-custom
            template:
              metadata:
                labels:
                  app: nginx-custom
              spec:
                containers:
                  - name: nginx
                    image: nginx-custom:latest
                    imagePullPolicy: Never
                    ports:
                      - containerPort: 80

    - name: Créer le Service NodePort
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: nginx-custom-svc
            namespace: nginx-app
          spec:
            type: NodePort
            selector:
              app: nginx-custom
            ports:
              - port: 80
                targetPort: 80